services:
    # Rust API service
    api:
        build:
            context: .
            dockerfile: web-api/Dockerfile
        ports:
            - "39901:39901"
        environment:
            - API_HOST=0.0.0.0
            - API_PORT=39901
            - CODEX_PLUS_DATA_DIR=/data
            - RUST_LOG=${RUST_LOG:-info}
        volumes:
            - codex-home:/root/.codex
            - codex-state:/root/.codex-session-delete
            - codex-data:/data
        restart: unless-stopped
        healthcheck:
            test: ["CMD", "curl", "-f", "http://localhost:39901/api/health"]
            interval: 30s
            timeout: 3s
            retries: 3
            start_period: 5s

    # Web frontend (served by Nginx)
    web:
        build:
            context: web-ui
            dockerfile: Dockerfile
        ports:
            - "80:80"
        depends_on:
            api:
                condition: service_healthy
        restart: unless-stopped

volumes:
    codex-home:
        driver: local
        driver_opts:
            type: none
            device: ${CODEX_HOME:-~/.codex}
            o: bind
    codex-state:
        driver: local
        driver_opts:
            type: none
            device: ${CODEX_STATE:-~/.codex-session-delete}
            o: bind
    codex-data:
        driver: local
